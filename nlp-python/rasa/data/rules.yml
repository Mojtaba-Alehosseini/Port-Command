# Minimal rules — Port Command Genova (task 12).
# Dialogue management is NOT used (the JADE Assistant drives dialogue via the
# confidence gate in task 14). This single rule exists so RulePolicy has training
# data and `rasa train` stays warning-clean.
version: "3.1"

rules:
  - rule: answer a help request
    steps:
      - intent: request_help
      - action: utter_help
